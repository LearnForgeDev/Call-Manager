# STUN/TURN server configuration for Coturn
# Make sure to replace placeholders with your actual domain and IP.

# Realm used for the REST API authentication (usually your domain name)
realm=learnforge.com

# Fingerprint in TURN message (required by WebRTC)
fingerprint

# Use the REST API authentication mechanism (time-limited credentials)
use-auth-secret
# IMPORTANT: This must match the COTURN_SECRET environment variable in your Go server!
static-auth-secret=your_super_secure_auth_secret_here

# Do not allow anonymous connections
no-loopback-peers
no-multicast-peers

# The public IP of the server where Coturn is running.
# If your server is behind a NAT (e.g., AWS, DigitalOcean), uncomment this line
# and put your PUBLIC IP address here:
# external-ip=203.0.113.50

# Listening ports
listening-port=3478
tls-listening-port=5349

# Min/Max port allocations for TURN relays (make sure your firewall/security groups allow UDP/TCP traffic on this range)
min-port=49152
max-port=65535

# Logging
log-file=/var/log/coturn/turnserver.log
verbose

# (Optional) TLS/DTLS Certificates for secure TURN (TURNS)
# cert=/etc/coturn/certs/fullchain.pem
# pkey=/etc/coturn/certs/privkey.pem